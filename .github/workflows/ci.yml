name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Build
        run: dotnet build backend.Tests/backend.Tests.csproj --no-restore --nologo

      - name: Test
        run: dotnet test backend.Tests/backend.Tests.csproj --no-build --nologo --logger "console;verbosity=normal"
