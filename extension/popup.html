<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>
  :root {
    --bg: #02040A; --surface: #0B1221; --surface-high: #282a2b;
    --on-surface: #e2e2e2; --outline: #8b91a0; --primary: #abc7ff;
    --on-primary: #002f66; --tertiary: #00dddd; --error: #ffb4ab;
  }
  * { box-sizing: border-box; font-family: 'Segoe UI', Inter, system-ui, sans-serif; }
  body { width: 340px; margin: 0; background: var(--bg); color: var(--on-surface); padding: 16px; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .header .logo { font-size: 18px; }
  .header h1 { font-size: 15px; margin: 0; font-weight: 700; }
  .url {
    font-size: 11px; color: var(--outline); background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 12px; word-break: break-all;
    max-height: 48px; overflow: hidden;
  }
  button {
    width: 100%; background: var(--primary); color: var(--on-primary);
    border: none; border-radius: 10px; padding: 10px; font-size: 14px;
    font-weight: 700; cursor: pointer; transition: filter .15s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: .5; cursor: default; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid rgba(171,199,255,.2);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 18px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
  .result { margin-top: 14px; }
  .verdict { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
  .verdict.true { color: var(--tertiary); }
  .verdict.fake { color: var(--error); }
  .verdict.uncertain { color: var(--primary); }
  .score-row { display: flex; align-items: baseline; gap: 8px; margin: 4px 0 10px; }
  .score { font-size: 30px; font-weight: 800; }
  .score-label { font-size: 11px; color: var(--outline); text-transform: uppercase; letter-spacing: 1px; }
  .explanation { font-size: 12px; color: var(--on-surface); line-height: 1.5; margin-bottom: 10px; }
  .flags { list-style: none; padding: 0; margin: 0 0 10px; }
  .flags li { font-size: 11px; color: var(--error); margin-bottom: 3px; }
  .mock-warn {
    font-size: 11px; color: #ffd479; background: rgba(255,180,0,.1);
    border: 1px solid rgba(255,180,0,.3); border-radius: 8px; padding: 6px 8px; margin-bottom: 10px;
  }
  .error-box { color: var(--error); font-size: 12px; margin-top: 12px; }
  .footer { margin-top: 12px; text-align: center; }
  .footer a { color: var(--primary); font-size: 11px; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <span class="logo">🔍</span>
    <h1>VerifyNews</h1>
  </div>

  <div id="url" class="url">Loading current tab…</div>

  <button id="analyze-btn">Analyse this page</button>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <p style="text-align:center;font-size:12px;color:var(--outline)">Analysing… this can take a few seconds.</p>
  </div>

  <div id="result" class="result hidden">
    <div id="mock-warn" class="mock-warn hidden">⚠ Demo data — AI not connected on the server.</div>
    <div id="verdict" class="verdict uncertain">—</div>
    <div class="score-row">
      <span id="score" class="score">—</span>
      <span class="score-label">Credibility</span>
    </div>
    <p id="explanation" class="explanation"></p>
    <ul id="flags" class="flags"></ul>
  </div>

  <div id="error" class="error-box hidden"></div>

  <div class="footer">
    <a id="open-app" href="#" target="_blank">Open VerifyNews →</a>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
