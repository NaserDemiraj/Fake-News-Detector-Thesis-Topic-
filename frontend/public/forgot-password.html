<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VerifyNews | Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { background-color: #02040A; color: #e2e2e2; -webkit-font-smoothing: antialiased; }
  .glass-card { background: rgba(11,18,33,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
  .mesh-bg { background-image: radial-gradient(at 0% 0%, rgba(171,199,255,0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(0,221,221,0.03) 0px, transparent 50%); }
  .field { background: rgba(11,18,33,0.7); border: 1px solid rgba(255,255,255,0.08); color: #e2e2e2; }
  .field:focus { outline: none; border-color: rgba(171,199,255,0.4); box-shadow: 0 0 0 2px rgba(171,199,255,0.1); }
</style>
</head>
<body class="font-body-md mesh-bg min-h-screen flex items-center justify-center px-margin">
<div class="glass-card rounded-2xl border border-outline-variant/20 p-lg max-w-md w-full">
  <a href="/" class="flex items-center gap-sm mb-lg">
    <span class="material-symbols-outlined text-tertiary text-[24px]">fact_check</span>
    <span class="font-headline-lg text-[20px] text-on-surface font-bold">VerifyNews</span>
  </a>

  <div id="form-view">
    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Forgot your password?</h1>
    <p class="text-on-surface-variant font-body-md mb-lg">Enter your email and we'll send you a link to reset it.</p>

    <label class="block text-label-sm text-outline uppercase tracking-widest mb-xs">Email</label>
    <input id="email" type="email" placeholder="you@example.com"
      class="field w-full rounded-xl px-md py-sm mb-md font-body-md"/>

    <p id="error-msg" class="hidden text-error text-sm mb-md"></p>

    <button id="submit-btn" onclick="submit()"
      class="w-full bg-primary text-on-primary py-sm rounded-xl font-label-md text-label-md font-bold hover:brightness-110 transition-all">
      Send reset link
    </button>
    <a href="/" class="block text-center mt-md text-primary text-label-md hover:underline">← Back to sign in</a>
  </div>

  <div id="done-view" class="hidden text-center">
    <div class="w-16 h-16 rounded-2xl bg-tertiary/20 flex items-center justify-center mx-auto mb-md">
      <span class="material-symbols-outlined text-tertiary text-[36px]">mark_email_read</span>
    </div>
    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Check your inbox</h1>
    <p class="text-on-surface-variant font-body-md mb-lg">If an account exists for that email, a reset link is on its way. The link expires in 1 hour.</p>
    <a href="/" class="block text-center text-primary text-label-md hover:underline">← Back to sign in</a>
  </div>
</div>

<script>
async function submit() {
    const email = document.getElementById('email').value.trim();
    const err = document.getElementById('error-msg');
    const btn = document.getElementById('submit-btn');
    err.classList.add('hidden');

    if (!email || !/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        err.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
        await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('done-view').classList.remove('hidden');
    } catch {
        err.textContent = 'Something went wrong. Please try again.';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
    }
}
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
